<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <ellipse cx="150" cy="270" rx="80" ry="12" fill="#000" opacity="0.3"/>
  <!-- body shaking -->
  <g transform="translate(150,175)">
    <ellipse cx="0" cy="30" rx="55" ry="65" fill="#4ade80"/>
    <ellipse cx="-25" cy="85" rx="18" ry="35" fill="#22c55e"/>
    <ellipse cx="25" cy="85" rx="18" ry="35" fill="#22c55e"/>
    <!-- head -->
    <circle cx="0" cy="-40" r="50" fill="#fde68a"/>
    <!-- terrified eyes -->
    <ellipse cx="-18" cy="-48" rx="14" ry="18" fill="white"/>
    <ellipse cx="18" cy="-48" rx="14" ry="18" fill="white"/>
    <circle cx="-16" cy="-44" r="6" fill="#111"/>
    <circle cx="20" cy="-44" r="6" fill="#111"/>
    <circle cx="-14" cy="-46" r="2" fill="white"/>
    <circle cx="22" cy="-46" r="2" fill="white"/>
    <!-- wavy mouth screaming -->
    <path d="M-20 -20 Q-10 -10 0 -18 Q10 -10 20 -20" stroke="#111" stroke-width="3" fill="none"/>
    <!-- sweat drops -->
    <ellipse cx="45" cy="-55" rx="6" ry="10" fill="#60a5fa" opacity="0.8"/>
    <ellipse cx="-50" cy="-30" rx="5" ry="8" fill="#60a5fa" opacity="0.8"/>
    <!-- trembling arms holding sign -->
    <rect x="-90" y="0" width="75" height="50" fill="#ef4444" rx="4" transform="rotate(-8)"/>
    <text x="-72" y="18" font-family="Arial Black" font-size="9" fill="white" transform="rotate(-8)">IT'S A</text>
    <text x="-78" y="32" font-family="Arial Black" font-size="9" fill="white" transform="rotate(-8)">SCAM!!!</text>
    <rect x="20" y="5" width="70" height="45" fill="#ef4444" rx="4" transform="rotate(6)"/>
    <text x="30" y="22" font-family="Arial Black" font-size="8" fill="white" transform="rotate(6)">RUG</text>
    <text x="28" y="36" font-family="Arial Black" font-size="8" fill="white" transform="rotate(6)">SOON</text>
    <!-- dumb hat -->
    <rect x="-35" y="-88" width="70" height="12" fill="#7c3aed"/>
    <rect x="-20" y="-100" width="40" height="14" fill="#7c3aed"/>
  </g>
  <text x="150" y="28" text-anchor="middle" font-family="Comic Sans MS,cursive" font-size="16" fill="#fbbf24" font-weight="bold">CAPTAIN FUDDER</text>
</svg>