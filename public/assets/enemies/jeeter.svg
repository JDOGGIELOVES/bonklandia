<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <ellipse cx="150" cy="275" rx="70" ry="10" fill="#000" opacity="0.3"/>
  <!-- running pose -->
  <g transform="translate(140,160)">
    <ellipse cx="10" cy="50" rx="45" ry="55" fill="#f97316"/>
    <!-- legs running -->
    <ellipse cx="-20" cy="100" rx="14" ry="40" fill="#ea580c" transform="rotate(-30)"/>
    <ellipse cx="35" cy="95" rx="14" ry="40" fill="#ea580c" transform="rotate(40)"/>
    <!-- head looking back panicked -->
    <circle cx="15" cy="-30" r="48" fill="#fcd34d"/>
    <ellipse cx="5" cy="-38" rx="16" ry="20" fill="white"/>
    <ellipse cx="30" cy="-35" rx="12" ry="16" fill="white"/>
    <circle cx="8" cy="-35" r="7" fill="#111"/>
    <circle cx="33" cy="-32" r="5" fill="#111"/>
    <!-- open screaming mouth -->
    <ellipse cx="20" cy="-10" rx="18" ry="14" fill="#111"/>
    <ellipse cx="20" cy="-8" rx="12" ry="8" fill="#ef4444"/>
    <!-- paper hands literally paper -->
    <rect x="-70" y="10" width="35" height="45" fill="#f5f5f4" stroke="#d6d3d1" stroke-width="2" transform="rotate(-20)" rx="2"/>
    <text x="-65" y="30" font-size="6" fill="#a8a29e" transform="rotate(-20)">PAPER</text>
    <text x="-67" y="40" font-size="6" fill="#a8a29e" transform="rotate(-20)">HANDS</text>
    <rect x="55" y="5" width="35" height="45" fill="#f5f5f4" stroke="#d6d3d1" stroke-width="2" transform="rotate(25)" rx="2"/>
    <text x="60" y="25" font-size="6" fill="#a8a29e" transform="rotate(25)">SELL</text>
    <text x="58" y="35" font-size="6" fill="#a8a29e" transform="rotate(25)">SELL</text>
    <!-- speed lines -->
    <line x1="-100" y1="-20" x2="-60" y2="-20" stroke="#94a3b8" stroke-width="3"/>
    <line x1="-110" y1="0" x2="-65" y2="0" stroke="#94a3b8" stroke-width="3"/>
    <line x1="-95" y1="20" x2="-55" y2="20" stroke="#94a3b8" stroke-width="3"/>
    <!-- chart going down on shirt -->
    <polyline points="-15,20 -5,35 5,25 15,45 25,30" fill="none" stroke="#ef4444" stroke-width="3"/>
  </g>
  <text x="150" y="28" text-anchor="middle" font-family="Comic Sans MS,cursive" font-size="15" fill="#fb923c" font-weight="bold">SIR JEETS-A-LOT</text>
</svg>